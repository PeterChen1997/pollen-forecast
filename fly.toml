# fly.toml app configuration file generated for pollen-forecast on 2026-03-31T08:10:36Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pollen-forecast'
primary_region = 'sin'

[build]

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
